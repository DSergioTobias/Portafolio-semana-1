<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Mascotas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Mis Mascotas</h1>

            <img src="https://placedog.net/300" alt="Perro">

        </article>
 
        <article>
            <img src="https://placedog.net/301" alt="Perro 2">
            <p>Perro 2</p>
        </article>
 
        <article>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8t5Qv9hoArKjwgA25zZgoNoKuhbVU2zc6-A&s" alt="Gato 2">
            <p>Gato 2</p>

    <a href="index.html">⬅ Volver al portafolio</a>
