<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Portafolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Encabezado: usa Flexbox (ver styles.css - TASK 2) -->
    <header>
        <h1>Sergio Tobias</h1>
        <nav>
            <a href="#sobre-mi">Sobre mí</a>
            <a href="#proyectos">Proyectos</a>
            <a href="#contacto">Contacto</a>
            <a href="mascotas.html">Mascotas</a>
        </nav>
    </header>

    <!-- Sección Sobre mí -->
    <section id="sobre-mi">
        <h2>Sobre mí</h2>
        <p>Soy estudiante de programación y me gusta desarrollar aplicaciones web.</p>
    </section>

    <!-- Sección Proyectos: usa CSS Grid (ver styles.css - TASK 3) -->
    <section id="proyectos">
        <h2>Proyectos</h2>
        <div class="grid-proyectos">
            <div class="card">Proyecto 1</div>
            <div class="card">Proyecto 2</div>
            <div class="card">Proyecto 3</div>
            <div class="card">Proyecto 4</div>
        </div>
    </section>

    <!-- Sección Contacto -->
    <section id="contacto">
        <h2>Contacto</h2>
        <form>
            <input type="text" placeholder="Nombre"><br>
            <input type="email" placeholder="Correo"><br>
            <button type="submit">Enviar</button>
        </form>
    </section>

</body>
</html>
